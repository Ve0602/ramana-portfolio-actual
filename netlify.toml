[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/videos_ai/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"
    Accept-Ranges = "bytes"

[[redirects]]
  from = "/404"
  to = "/404.html"
  status = 404
